name: Auto-update CodeRabbit CLI

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 08:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new version
        id: check
        run: |
          LATEST=$(curl -fsSL https://cli.coderabbit.ai/releases/latest/VERSION | tr -d '[:space:]')
          CURRENT=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "New version available: $CURRENT -> $LATEST"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date: $CURRENT"
          fi

      - name: Compute hashes
        if: steps.check.outputs.needs_update == 'true'
        id: hashes
        run: |
          VERSION=${{ steps.check.outputs.latest }}
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            HASH=$(curl -fsSL "https://cli.coderabbit.ai/releases/${VERSION}/coderabbit-${platform}.zip" | sha256sum | cut -d' ' -f1)
            SRI="sha256-$(echo "$HASH" | xxd -r -p | base64 -w0)"
            echo "${platform}=${SRI}" >> "$GITHUB_OUTPUT"
            echo "${platform}: ${SRI}"
          done

      - name: Update package.nix
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION=${{ steps.check.outputs.latest }}
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" package.nix
          sed -i "s|x86_64-linux = { suffix = \"linux-x64\"; hash = \".*\"|x86_64-linux = { suffix = \"linux-x64\"; hash = \"${{ steps.hashes.outputs.linux-x64 }}\"|" package.nix
          sed -i "s|aarch64-linux = { suffix = \"linux-arm64\"; hash = \".*\"|aarch64-linux = { suffix = \"linux-arm64\"; hash = \"${{ steps.hashes.outputs.linux-arm64 }}\"|" package.nix
          sed -i "s|x86_64-darwin = { suffix = \"darwin-x64\"; hash = \".*\"|x86_64-darwin = { suffix = \"darwin-x64\"; hash = \"${{ steps.hashes.outputs.darwin-x64 }}\"|" package.nix
          sed -i "s|aarch64-darwin = { suffix = \"darwin-arm64\"; hash = \".*\"|aarch64-darwin = { suffix = \"darwin-arm64\"; hash = \"${{ steps.hashes.outputs.darwin-arm64 }}\"|" package.nix
          echo "Updated package.nix to version ${VERSION}"
          cat package.nix

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "chore: update coderabbit CLI to ${{ steps.check.outputs.latest }}"
          git push
